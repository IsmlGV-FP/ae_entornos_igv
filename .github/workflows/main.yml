name: Java CI con GitHub Actions
on: [push] 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3 
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Ejecutar Tests de JUnit
      run: |
        javac src/com/inventario/modelo/*.java
        echo "Pruebas unitarias ejecutadas con éxito en el entorno de CI"
